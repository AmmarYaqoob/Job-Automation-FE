<table mat-table [dataSource]="jobs" class="recent-jobs-table">
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Title</th>
    <td mat-cell *matCellDef="let job">
      <a (click)="navigateToJob(job.id)" class="job-link">{{ job.title }}</a>
    </td>
  </ng-container>

  <ng-container matColumnDef="company">
    <th mat-header-cell *matHeaderCellDef>Company</th>
    <td mat-cell *matCellDef="let job">{{ job.company }}</td>
  </ng-container>

  <ng-container matColumnDef="atsScore">
    <th mat-header-cell *matHeaderCellDef>ATS Score</th>
    <td mat-cell *matCellDef="let job">
      <span [class]="'ats-badge ' + (job.atsScore | atsScoreColor)">
        {{ job.atsScore }}
      </span>
    </td>
  </ng-container>

  <ng-container matColumnDef="dateFound">
    <th mat-header-cell *matHeaderCellDef>Date Found</th>
    <td mat-cell *matCellDef="let job">{{ job.dateFound | dateFormat }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="job-row"></tr>
</table>
