<div class="login-container">
    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>Job Automation</mat-card-title>
            <mat-card-subtitle>Sign up</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Username</mat-label>
                    <input matInput type="text" formControlName="username" required>
                    <mat-error *ngIf="signupForm.get('username')?.hasError('required')">
                        Username is required
                    </mat-error>
                </mat-form-field>
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" formControlName="email" required>
                    <mat-error *ngIf="signupForm.get('email')?.hasError('required')">
                        Email is required
                    </mat-error>
                    <mat-error *ngIf="signupForm.get('email')?.hasError('email')">
                        Invalid email format
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" formControlName="password" required>
                    <mat-error *ngIf="signupForm.get('password')?.hasError('required')">
                        Password is required
                    </mat-error>
                    <mat-error *ngIf="signupForm.get('password')?.hasError('minlength')">
                        Password must be at least 6 characters
                    </mat-error>
                </mat-form-field>

                <div class="error-message" *ngIf="error">
                    {{ error }}
                </div>

                <button mat-raised-button color="primary" type="submit" class="full-width"
                    [disabled]="loading || signupForm.invalid">
                    <mat-spinner diameter="20" *ngIf="loading" class="inline-spinner"></mat-spinner>
                    <span *ngIf="!loading">Sign Up</span>
                </button>
                <a mat-raised-button color="primary" type="button" class="full-width" routerLink="/auth/login">
                    <span>Login</span>
                </a>
            </form>
        </mat-card-content>
    </mat-card>
</div>
